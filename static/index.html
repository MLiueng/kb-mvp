<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>知识库系统 MVP</title>
  <style>
    :root {
      --bg: #f5f7fa;
      --panel: #ffffff;
      --sidebar-bg: #1e293b;
      --sidebar-fg: #e2e8f0;
      --sidebar-muted: #94a3b8;
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --primary-soft: #eef2ff;
      --border: #e2e8f0;
      --user-bubble: #4f46e5;
      --user-fg: #ffffff;
      --bot-bubble: #ffffff;
      --bot-fg: #1e293b;
      --danger: #ef4444;
      --highlight: #fde68a;
      --highlight-strong: #fbbf24;
      --muted: #64748b;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: #0f172a;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ---------- 侧边栏 ---------- */
    .sidebar {
      width: 300px;
      min-width: 300px;
      background: var(--sidebar-bg);
      color: var(--sidebar-fg);
      display: flex;
      flex-direction: column;
      border-right: 1px solid #0f172a;
    }
    .sidebar-header {
      padding: 20px 18px 14px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .sidebar-header h1 {
      font-size: 17px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sidebar-header .subtitle {
      font-size: 12px;
      color: var(--sidebar-muted);
      margin-top: 4px;
    }
    .upload-area { padding: 16px 18px; border-bottom: 1px solid rgba(255,255,255,.08); }
    .upload-btn {
      display: block;
      width: 100%;
      padding: 11px 14px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: background .15s;
    }
    .upload-btn:hover { background: var(--primary-hover); }
    .upload-btn:disabled { background: #475569; cursor: not-allowed; }
    .upload-hint {
      font-size: 11px;
      color: var(--sidebar-muted);
      margin-top: 8px;
      line-height: 1.5;
    }
    .upload-status {
      font-size: 12px;
      margin-top: 8px;
      padding: 6px 8px;
      border-radius: 6px;
      display: none;
    }
    .upload-status.show { display: block; }
    .upload-status.info { background: rgba(79,70,229,.2); color: #c7d2fe; }
    .upload-status.error { background: rgba(239,68,68,.2); color: #fecaca; }
    .upload-status.success { background: rgba(34,197,94,.2); color: #bbf7d0; }

    .doc-list-header {
      padding: 14px 18px 8px;
      font-size: 12px;
      color: var(--sidebar-muted);
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .doc-list { flex: 1; overflow-y: auto; padding: 0 10px 12px; }
    .doc-item {
      display: flex;
      align-items: center;
      padding: 10px 10px;
      border-radius: 8px;
      margin-bottom: 4px;
      transition: background .15s;
    }
    .doc-item:hover { background: rgba(255,255,255,.06); }
    .doc-icon { font-size: 16px; margin-right: 10px; }
    .doc-meta { flex: 1; min-width: 0; }
    .doc-name {
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .doc-chunks { font-size: 11px; color: var(--sidebar-muted); margin-top: 2px; }
    .doc-delete {
      opacity: 0;
      background: none;
      border: none;
      color: var(--danger);
      cursor: pointer;
      font-size: 16px;
      padding: 4px 6px;
      border-radius: 4px;
      transition: opacity .15s, background .15s;
    }
    .doc-item:hover .doc-delete { opacity: 1; }
    .doc-delete:hover { background: rgba(239,68,68,.15); }
    .doc-empty {
      padding: 20px 18px;
      font-size: 12px;
      color: var(--sidebar-muted);
      text-align: center;
      line-height: 1.6;
    }

    /* ---------- 主对话区 ---------- */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: var(--bg);
    }
    .mobile-bar {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
    }
    .mobile-bar .menu-btn {
      background: none; border: 1px solid var(--border); border-radius: 8px;
      font-size: 18px; padding: 4px 12px; cursor: pointer; line-height: 1;
      color: var(--bot-fg);
    }
    .mobile-bar .title { font-weight: 700; font-size: 15px; }
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0;
    }
    .chat-inner {
      max-width: 820px;
      margin: 0 auto;
      padding: 0 24px;
    }
    .welcome {
      text-align: center;
      padding: 60px 20px 40px;
    }
    .welcome h2 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .welcome p { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
    .example-questions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 460px;
      margin: 0 auto;
    }
    .example-q {
      padding: 12px 16px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      transition: border-color .15s, box-shadow .15s;
    }
    .example-q:hover {
      border-color: var(--primary);
      box-shadow: var(--shadow);
    }

    .msg { margin-bottom: 20px; }
    .msg-user {
      display: flex;
      justify-content: flex-end;
    }
    .msg-user .bubble {
      background: var(--user-bubble);
      color: var(--user-fg);
      border-radius: var(--radius) var(--radius) 4px var(--radius);
    }
    .msg-bot { display: flex; flex-direction: column; align-items: flex-start; }
    .msg-bot .bubble {
      background: var(--bot-bubble);
      color: var(--bot-fg);
      border-radius: var(--radius) var(--radius) var(--radius) 4px;
      box-shadow: var(--shadow);
    }
    .bubble {
      max-width: 75%;
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .sources {
      max-width: 75%;
      margin-bottom: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .source-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: var(--primary-soft);
      border: 1px solid #c7d2fe;
      border-radius: 8px;
      font-size: 12px;
      color: #3730a3;
      cursor: pointer;
      transition: background .15s, transform .1s;
    }
    .source-tag:hover { background: #e0e7ff; }
    .source-tag:active { transform: scale(.97); }
    .source-tag .score { color: var(--muted); font-size: 11px; }
    .source-tag .preview {
      display: none;
      position: absolute;
      background: #1e293b;
      color: #fff;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 11px;
      max-width: 280px;
      z-index: 50;
      margin-top: 6px;
      box-shadow: 0 4px 12px rgba(0,0,0,.2);
    }
    .source-tag { position: relative; }
    .source-tag:hover .preview { display: block; }

    /* 答案内引用链接 */
    .cite-link {
      display: inline;
      color: var(--primary);
      text-decoration: none;
      cursor: pointer;
      font-weight: 600;
      border-bottom: 1px dashed var(--primary);
      padding: 0 1px;
      border-radius: 2px;
      transition: background .15s, color .15s;
    }
    .cite-link:hover {
      background: var(--primary-soft);
      color: var(--primary-hover);
    }
    .cite-link:active { transform: scale(.96); }

    .cursor::after {
      content: "▋";
      animation: blink 1s steps(2) infinite;
      color: var(--primary);
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ---------- 输入区 ---------- */
    .input-area {
      border-top: 1px solid var(--border);
      background: var(--panel);
      padding: 14px 24px 18px;
    }
    .input-inner {
      max-width: 820px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .input-box {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
      outline: none;
      transition: border-color .15s;
    }
    .input-box:focus { border-color: var(--primary); }
    .send-btn {
      padding: 11px 20px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .send-btn:hover:not(:disabled) { background: var(--primary-hover); }
    .send-btn:disabled { background: #94a3b8; cursor: not-allowed; }

    /* ---------- 文档查看器抽屉（引用预览） ---------- */
    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,.4);
      z-index: 100;
      display: none;
    }
    .drawer-overlay.show { display: block; }
    .drawer {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 560px;
      max-width: 90vw;
      background: var(--panel);
      z-index: 101;
      transform: translateX(100%);
      transition: transform .25s ease;
      display: flex;
      flex-direction: column;
      box-shadow: -4px 0 24px rgba(0,0,0,.12);
    }
    .drawer.show { transform: translateX(0); }
    .drawer-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .drawer-title { flex: 1; min-width: 0; }
    .drawer-title .name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .drawer-title .meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .drawer-type-badge {
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 600;
      color: var(--primary);
      background: var(--primary-soft);
      padding: 3px 8px;
      border-radius: 6px;
      white-space: nowrap;
    }
    .drawer-close {
      background: none; border: none; font-size: 22px; cursor: pointer;
      color: var(--muted); padding: 2px 8px; border-radius: 6px; line-height: 1;
      flex-shrink: 0;
    }
    .drawer-close:hover { background: var(--bg); color: var(--danger); }
    .drawer-body {
      flex: 1; overflow-y: auto; padding: 20px 24px;
    }
    .doc-block {
      font-size: 14px;
      line-height: 1.8;
      margin-bottom: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .doc-block.heading { font-weight: 700; font-size: 15px; }
    mark.hl {
      background: var(--highlight);
      padding: 1px 2px;
      border-radius: 2px;
      animation: hlflash 1.2s ease 2;
    }
    @keyframes hlflash {
      0%,100% { background: var(--highlight); }
      50% { background: var(--highlight-strong); }
    }
    .drawer-loading { padding: 40px; text-align: center; color: var(--muted); font-size: 13px; }

    /* ---------- 移动端侧边栏遮罩 ---------- */
    .sidebar-overlay {
      position: fixed; inset: 0; background: rgba(15,23,42,.4);
      z-index: 199; display: none;
    }
    .sidebar-overlay.show { display: block; }

    /* ---------- 响应式：移动端 ---------- */
    @media (max-width: 768px) {
      body { flex-direction: column; }
      .sidebar {
        position: fixed;
        top: 0; left: 0; bottom: 0;
        width: 280px;
        max-width: 85vw;
        z-index: 200;
        transform: translateX(-100%);
        transition: transform .25s ease;
      }
      .sidebar.open { transform: translateX(0); }
      .mobile-bar { display: flex; }
      .main { width: 100%; }
      .chat-inner { padding: 0 14px; }
      .bubble, .sources { max-width: 90%; }
      .drawer { width: 100vw; max-width: 100vw; }
      .drawer-body { padding: 16px; }
      .input-area { padding: 10px 14px 14px; }
      .send-btn { padding: 11px 16px; }
    }

    /* 滚动条 */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .sidebar ::-webkit-scrollbar-thumb { background: #475569; }
  </style>
</head>
<body>
  <!-- 侧边栏 -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1>📚 知识库 MVP</h1>
      <div class="subtitle">文档上传 → 检索 → RAG 问答</div>
    </div>
    <div class="upload-area">
      <button class="upload-btn" id="uploadBtn">📤 上传文档</button>
      <input type="file" id="fileInput" accept=".pdf,.docx,.doc,.txt,.md,.markdown" hidden />
      <div class="upload-hint">支持 PDF / Word / TXT / Markdown，单文件 ≤ 50MB</div>
      <div class="upload-status" id="uploadStatus"></div>
    </div>
    <div class="doc-list-header">文档列表（<span id="totalChunks">0</span> 块）</div>
    <div class="doc-list" id="docList">
      <div class="doc-empty">暂无文档<br/>请先上传文档以开始问答</div>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- 主对话区 -->
  <main class="main">
    <div class="mobile-bar">
      <button class="menu-btn" id="menuBtn">☰</button>
      <span class="title">📚 知识库 MVP</span>
    </div>
    <div class="chat-area" id="chatArea">
      <div class="chat-inner" id="chatInner">
        <div class="welcome" id="welcome">
          <h2>👋 欢迎使用知识库问答</h2>
          <p>上传文档后，即可基于文档内容进行智能问答，答案附带来源溯源</p>
          <div class="example-questions" id="exampleQs" style="display:none">
            <button class="example-q" data-q="请总结这份文档的核心内容">请总结这份文档的核心内容</button>
            <button class="example-q" data-q="文档中提到了哪些关键要点？">文档中提到了哪些关键要点？</button>
            <button class="example-q" data-q="请列出文档的主要结论">请列出文档的主要结论</button>
          </div>
        </div>
      </div>
    </div>
    <div class="input-area">
      <div class="input-inner">
        <textarea class="input-box" id="inputBox" rows="1"
          placeholder="输入问题，回车发送（Shift+回车换行）..."></textarea>
        <button class="send-btn" id="sendBtn" disabled>发送</button>
      </div>
    </div>
  </main>

  <!-- 文档查看器抽屉（引用预览） -->
  <div class="drawer-overlay" id="drawerOverlay"></div>
  <aside class="drawer" id="drawer">
    <div class="drawer-header">
      <div class="drawer-title">
        <div class="name" id="drawerName">文档查看器</div>
        <div class="meta" id="drawerMeta"></div>
      </div>
      <span class="drawer-type-badge" id="drawerType"></span>
      <button class="drawer-close" id="drawerClose">×</button>
    </div>
    <div class="drawer-body" id="drawerBody">
      <div class="drawer-loading">加载中...</div>
    </div>
  </aside>

  <script>
    // ---------- 全局状态 ----------
    const API = '/api';
    let isStreaming = false;
    let docCount = 0;

    // 文件类型元信息（图标 + 标签），用于引用预览顶部展示
    const FILE_TYPE_META = {
      pdf:  { icon: '📕', label: 'PDF 文档' },
      docx: { icon: '📘', label: 'Word 文档' },
      txt:  { icon: '📄', label: '纯文本' },
      md:   { icon: '📝', label: 'Markdown' },
    };

    // ---------- DOM 引用 ----------
    const $ = (id) => document.getElementById(id);
    const uploadBtn = $('uploadBtn'), fileInput = $('fileInput');
    const uploadStatus = $('uploadStatus');
    const docList = $('docList'), totalChunks = $('totalChunks');
    const chatArea = $('chatArea'), chatInner = $('chatInner'), welcome = $('welcome');
    const exampleQs = $('exampleQs');
    const inputBox = $('inputBox'), sendBtn = $('sendBtn');
    const drawer = $('drawer'), drawerOverlay = $('drawerOverlay');
    const drawerClose = $('drawerClose'), drawerBody = $('drawerBody');
    const drawerName = $('drawerName'), drawerMeta = $('drawerMeta'), drawerType = $('drawerType');
    const sidebar = $('sidebar'), sidebarOverlay = $('sidebarOverlay'), menuBtn = $('menuBtn');

    // ---------- 工具函数 ----------
    function setStatus(msg, type = 'info') {
      uploadStatus.textContent = msg;
      uploadStatus.className = 'upload-status show ' + type;
    }
    function hideStatus() { uploadStatus.className = 'upload-status'; }
    function scrollToBottom() {
      chatArea.scrollTop = chatArea.scrollHeight;
    }
    function autoGrow() {
      inputBox.style.height = 'auto';
      inputBox.style.height = Math.min(inputBox.scrollHeight, 120) + 'px';
    }

    // ---------- 文档列表 ----------
    async function refreshDocs() {
      try {
        const res = await fetch(`${API}/documents`);
        const data = await res.json();
        renderDocs(data.documents || []);
        totalChunks.textContent = data.total_chunks || 0;
        docCount = (data.documents || []).length;
        sendBtn.disabled = isStreaming || docCount === 0;
        // 有文档时显示示例问题
        if (docCount > 0 && welcome) exampleQs.style.display = 'flex';
      } catch (e) {
        renderDocs([]);
      }
    }
    function renderDocs(docs) {
      if (!docs.length) {
        docList.innerHTML = '<div class="doc-empty">暂无文档<br/>请先上传文档以开始问答</div>';
        return;
      }
      docList.innerHTML = docs.map(d => `
        <div class="doc-item">
          <span class="doc-icon">📄</span>
          <div class="doc-meta">
            <div class="doc-name" title="${escapeHtml(d.doc_name)}">${escapeHtml(d.doc_name)}</div>
            <div class="doc-chunks">${d.chunk_count} 块</div>
          </div>
          <button class="doc-delete" title="删除" data-id="${d.doc_id}">✕</button>
        </div>
      `).join('');
      docList.querySelectorAll('.doc-delete').forEach(btn => {
        btn.onclick = () => deleteDoc(btn.dataset.id);
      });
    }
    async function deleteDoc(docId) {
      if (!confirm('确定删除该文档及其全部向量？')) return;
      try {
        await fetch(`${API}/documents/${docId}`, { method: 'DELETE' });
        refreshDocs();
      } catch (e) {
        alert('删除失败：' + e.message);
      }
    }

    // ---------- 上传 ----------
    uploadBtn.onclick = () => fileInput.click();
    fileInput.onchange = async () => {
      const file = fileInput.files[0];
      if (!file) return;
      setStatus(`正在上传「${file.name}」...`, 'info');
      uploadBtn.disabled = true;
      const fd = new FormData();
      fd.append('file', file);
      try {
        const res = await fetch(`${API}/upload`, { method: 'POST', body: fd });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || '上传失败');
        setStatus(`✅ 上传成功：${data.chunk_count} 块，共 ${data.char_count} 字`, 'success');
        refreshDocs();
      } catch (e) {
        setStatus(`❌ ${e.message}`, 'error');
      } finally {
        uploadBtn.disabled = false;
        fileInput.value = '';
        setTimeout(() => { if (uploadStatus.classList.contains('success')) hideStatus(); }, 4000);
      }
    };

    // ---------- 答案渲染：[资料N] 转可点击引用链接 ----------
    // 流式输出时逐 token 累积，每次对完整文本重新解析，兼容引用标识被分割到多个 token 的情况。
    function renderAnswerText(bubble, text) {
      const sources = bubble._sources || [];
      // 先转义 HTML，再把 [资料N] 替换为可点击链接
      let html = escapeHtml(text);
      html = html.replace(/\[资料\s*(\d+)\]/g, (m, num) => {
        const idx = parseInt(num, 10) - 1; // 引用为 1 基，sources 为 0 基
        const s = sources[idx];
        if (s) {
          return `<a class="cite-link" data-doc="${escapeHtml(s.doc_id)}" data-chunk="${escapeHtml(s.chunk_id)}" data-idx="${idx}">[资料${num}]</a>`;
        }
        return m; // 无对应来源则保留原文
      });
      bubble.innerHTML = html;
    }

    // 引用链接点击事件委托（覆盖所有消息中的引用，支持多引用同时标记）
    chatInner.addEventListener('click', (e) => {
      const link = e.target.closest('.cite-link');
      if (!link) return;
      e.preventDefault();
      openViewer(link.dataset.doc, link.dataset.chunk);
    });

    // ---------- 问答 ----------
    async function sendQuestion(question) {
      if (!question.trim() || isStreaming) return;
      if (docCount === 0) { alert('请先上传文档'); return; }

      // 隐藏欢迎页
      if (welcome) welcome.style.display = 'none';
      isStreaming = true;
      sendBtn.disabled = true;

      // 用户消息
      const userMsg = document.createElement('div');
      userMsg.className = 'msg msg-user';
      userMsg.innerHTML = `<div class="bubble">${escapeHtml(question)}</div>`;
      chatInner.appendChild(userMsg);

      // 助手消息容器
      const botMsg = document.createElement('div');
      botMsg.className = 'msg msg-bot';
      const sourcesEl = document.createElement('div');
      sourcesEl.className = 'sources';
      const bubble = document.createElement('div');
      bubble.className = 'bubble cursor';
      botMsg.appendChild(sourcesEl);
      botMsg.appendChild(bubble);
      chatInner.appendChild(botMsg);
      scrollToBottom();

      try {
        const res = await fetch(`${API}/ask`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question }),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || `请求失败 (${res.status})`);
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let answerText = '';
        let currentSources = [];

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          // SSE 以 \n\n 分隔事件
          const events = buffer.split('\n\n');
          buffer = events.pop(); // 保留不完整部分
          for (const evt of events) {
            const line = evt.trim();
            if (!line.startsWith('data:')) continue;
            const payload = line.slice(5).trim();
            if (!payload) continue;
            let obj;
            try { obj = JSON.parse(payload); } catch { continue; }
            if (obj.type === 'sources') {
              currentSources = obj.data || [];
              bubble._sources = currentSources; // 供引用链接映射
              renderSources(sourcesEl, currentSources);
            } else if (obj.type === 'token') {
              answerText += obj.data;
              renderAnswerText(bubble, answerText);
              scrollToBottom();
            } else if (obj.type === 'error') {
              answerText += `\n[错误] ${obj.data}`;
              renderAnswerText(bubble, answerText);
            } else if (obj.type === 'done') {
              bubble.classList.remove('cursor');
              renderAnswerText(bubble, answerText); // 最终渲染确保引用链接就位
            }
          }
        }
        if (bubble.classList.contains('cursor')) bubble.classList.remove('cursor');
      } catch (e) {
        bubble.classList.remove('cursor');
        bubble.textContent = `❌ 请求失败：${e.message}`;
      } finally {
        isStreaming = false;
        sendBtn.disabled = docCount === 0;
      }
    }

    function renderSources(container, sources) {
      if (!sources || !sources.length) return;
      container.innerHTML = sources.map((s, i) => {
        const loc = s.locator || {};
        let meta = [];
        if (loc.page_number) meta.push('P' + loc.page_number);
        if (loc.section) meta.push(escapeHtml(loc.section));
        meta.push(Math.round((s.score || 0) * 100) + '%');
        return `
          <span class="source-tag" data-doc="${s.doc_id}" data-chunk="${s.chunk_id}">
            📄 ${escapeHtml(s.doc_name)}${meta.length ? ' · ' + meta.join(' · ') : ''}
            <span class="preview">${escapeHtml(s.preview || '')}</span>
          </span>
        `;
      }).join('');
      container.querySelectorAll('.source-tag').forEach(tag => {
        tag.onclick = () => openViewer(tag.dataset.doc, tag.dataset.chunk);
      });
    }

    // ---------- 溯源文档查看器（引用预览） ----------
    async function openViewer(docId, chunkId) {
      drawer.classList.add('show');
      drawerOverlay.classList.add('show');
      drawerName.textContent = '加载中...';
      drawerMeta.textContent = '';
      drawerType.textContent = '';
      drawerBody.innerHTML = '<div class="drawer-loading">加载中...</div>';
      try {
        const [contentRes, chunkRes] = await Promise.all([
          fetch(`${API}/documents/${docId}/content`).then(r => r.json()),
          fetch(`${API}/documents/${docId}/chunk/${chunkId}`).then(r => r.json()),
        ]);
        renderViewer(contentRes, chunkRes);
      } catch (e) {
        drawerBody.innerHTML = `<div class="drawer-loading">加载失败：${escapeHtml(e.message)}</div>`;
      }
    }
    function renderViewer(content, chunk) {
      const loc = (chunk && chunk.locator) || {};
      const blocks = content.blocks || [];
      // 顶部：文档类型 + 名称
      const ft = FILE_TYPE_META[content.file_type] || { icon: '📄', label: content.file_type || '文档' };
      drawerName.textContent = `${ft.icon} ${content.doc_name || ''}`;
      drawerType.textContent = ft.label;
      // 元信息：页码 / 章节 / 字符区间
      const metas = [];
      if (loc.page_number) metas.push('第 ' + loc.page_number + ' 页');
      if (loc.section) metas.push(escapeHtml(loc.section));
      metas.push(`字符 ${loc.char_start ?? 0}-${loc.char_end ?? 0}`);
      drawerMeta.textContent = metas.join(' · ');

      const cs = loc.char_start ?? 0;
      const ce = loc.char_end ?? 0;
      drawerBody.innerHTML = blocks.map(b => {
        // 计算与高亮区间的重叠
        const bs = b.char_start, be = b.char_end;
        if (be <= cs || bs >= ce) {
          return `<div class="doc-block ${b.block_type}">${escapeHtml(b.text)}</div>`;
        }
        // 块内高亮起点/终点
        const hiStart = Math.max(cs - bs, 0);
        const hiEnd = Math.min(ce - bs, be - bs);
        const before = escapeHtml(b.text.slice(0, hiStart));
        const mid = escapeHtml(b.text.slice(hiStart, hiEnd));
        const after = escapeHtml(b.text.slice(hiEnd));
        return `<div class="doc-block ${b.block_type}" data-char-start="${bs}" data-char-end="${be}">${before}<mark class="hl">${mid}</mark>${after}</div>`;
      }).join('');

      // 滚动到第一个高亮块
      const firstHl = drawerBody.querySelector('mark.hl');
      if (firstHl) firstHl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    function closeViewer() {
      drawer.classList.remove('show');
      drawerOverlay.classList.remove('show');
    }
    drawerClose.onclick = closeViewer;
    drawerOverlay.onclick = closeViewer;

    // ---------- 移动端侧边栏切换 ----------
    function openSidebar() {
      sidebar.classList.add('open');
      sidebarOverlay.classList.add('show');
    }
    function closeSidebar() {
      sidebar.classList.remove('open');
      sidebarOverlay.classList.remove('show');
    }
    menuBtn.onclick = openSidebar;
    sidebarOverlay.onclick = closeSidebar;

    // ---------- 输入交互 ----------
    inputBox.addEventListener('input', autoGrow);
    inputBox.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        const q = inputBox.value;
        inputBox.value = '';
        autoGrow();
        sendQuestion(q);
      }
    });
    sendBtn.onclick = () => {
      const q = inputBox.value;
      inputBox.value = '';
      autoGrow();
      sendQuestion(q);
    };
    // 示例问题
    exampleQs.addEventListener('click', (e) => {
      const t = e.target.closest('.example-q');
      if (!t) return;
      sendQuestion(t.dataset.q);
    });

    function escapeHtml(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    // ---------- 初始化 ----------
    refreshDocs();
  </script>
</body>
</html>
